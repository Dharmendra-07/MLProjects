<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Exam Performance Predictor</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Poppins', sans-serif;
    }
    body {
        min-height: 100vh;
        background: linear-gradient(-45deg,
                #0f172a,
                #1e293b,
                #2563eb,
                #06b6d4);
        background-size: 400% 400%;
        animation: gradient 15s ease infinite;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 30px;
    }
    @keyframes gradient {
        0% {
            background-position: 0% 50%;
        }
        50% {
            background-position: 100% 50%;
        }
        100% {
            background-position: 0% 50%;
        }
    }
    .login {
        width: 100%;
        max-width: 850px;
        padding: 40px;
        border-radius: 25px;
        background: rgba(255, 255, 255, 0.12);
        backdrop-filter: blur(18px);
        -webkit-backdrop-filter: blur(18px);
        border: 1px solid rgba(255, 255, 255, 0.2);
        box-shadow:
            0 25px 50px rgba(0, 0, 0, 0.35),
            inset 0 1px 1px rgba(255, 255, 255, 0.2);
        transition: all 0.4s ease;
    }
    .login:hover {
        transform: translateY(-5px);
    }
    h1 {
        color: white;
        text-align: center;
        font-weight: 700;
        margin-bottom: 20px;
    }
    legend {
        color: #ffffff;
        text-align: center;
        font-size: 1.6rem;
        font-weight: 600;
        margin-bottom: 25px;
    }
    .form-label {
        color: white;
        font-weight: 500;
        margin-bottom: 8px;
    }
    .form-control {
        border-radius: 12px;
        border: none;
        padding: 12px;
        background: rgba(255, 255, 255, 0.15);
        color: white;
        transition: all 0.3s ease;
    }
    .form-control:focus {
        background: rgba(255, 255, 255, 0.2);
        color: white;
        box-shadow:
            0 0 0 3px rgba(37, 99, 235, 0.35),
            0 10px 25px rgba(37, 99, 235, 0.3);
    }
    .form-control::placeholder {
        color: rgba(255, 255, 255, 0.8);
    }
    select option {
        color: black;
    }
    .btn-primary {
        width: 100%;
        padding: 14px;
        border: none;
        border-radius: 14px;
        background: linear-gradient(135deg,
                #3b82f6,
                #06b6d4);
        font-size: 17px;
        font-weight: 600;
        transition: all 0.3s ease;
    }
    .btn-primary:hover {
        transform: translateY(-3px);
        box-shadow:
            0 15px 30px rgba(37, 99, 235, 0.45);
    }
    .result-box {
        margin-top: 25px;
        padding: 20px;
        border-radius: 15px;
        background: rgba(255, 255, 255, 0.12);
        color: white;
        text-align: center;
        box-shadow:
            inset 0 1px 1px rgba(255, 255, 255, 0.15);
        font-weight: 600;
    }
    .subtitle {
        text-align: center;
        color: #e2e8f0;
        margin-bottom: 20px;
    }
    @media (max-width:768px) {
        .login {
            padding: 25px;
        }
        legend {
            font-size: 1.2rem;
        }
    }
</style>
</head>
<body>
<div class="login">
    <h1>🎓 Student Exam Performance Indicator</h1>
    <p class="subtitle">
        Predict Mathematics Score using Machine Learning
    </p>
    <form action="{{ url_for('predict_datapoint') }}" method="post">
        <legend>Student Exam Performance Prediction</legend>
        <div class="mb-3">
            <label class="form-label">Gender</label>
            <select class="form-control" name="gender" required>
                <option selected disabled value="">Select your Gender</option>
                <option value="male">Male</option>
                <option value="female">Female</option>
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">Race or Ethnicity</label>
            <select class="form-control" name="ethnicity" required>
                <option selected disabled value="">Select Ethnicity</option>
                <option value="group A">Group A</option>
                <option value="group B">Group B</option>
                <option value="group C">Group C</option>
                <option value="group D">Group D</option>
                <option value="group E">Group E</option>
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">Parental Level of Education</label>
            <select class="form-control" name="parental_level_of_education" required>
                <option selected disabled value="">Select Parent Education</option>
                <option value="associate's degree">associate's degree</option>
                <option value="bachelor's degree">bachelor's degree</option>
                <option value="high school">high school</option>
                <option value="master's degree">master's degree</option>
                <option value="some college">some college</option>
                <option value="some high school">some high school</option>
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">Lunch Type</label>
            <select class="form-control" name="lunch" required>
                <option selected disabled value="">Select Lunch Type</option>
                <option value="free/reduced">free/reduced</option>
                <option value="standard">standard</option>
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">Test Preparation Course</label>
            <select class="form-control" name="test_preparation_course" required>
                <option selected disabled value="">Select Test Course</option>
                <option value="none">None</option>
                <option value="completed">Completed</option>
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">Reading Score out of 100</label>
            <input class="form-control"
                   type="number"
                   name="reading_score"
                   placeholder="Enter Reading Score"
                   min="0"
                   max="100"
                   required>
        </div>
        <div class="mb-3">
            <label class="form-label">Writing Score out of 100</label>
            <input class="form-control"
                   type="number"
                   name="writing_score"
                   placeholder="Enter Writing Score"
                   min="0"
                   max="100"
                   required>
        </div>
        <div class="mb-3">
            <input class="btn btn-primary"
                   type="submit"
                   value="Predict Maths Score">
        </div>
    </form>
    {% if results %}
    <div class="result-box">
        <h3>📊 Predicted Maths Score</h3>
        <h2>{{ results }}</h2>
    </div>
    {% endif %}
</div>
</body>
</html>
